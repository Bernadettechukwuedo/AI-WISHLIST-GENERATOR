{% extends 'recommender/base.html' %}

{% block content %}
<div class="mx-auto max-w-lg px-4 py-12">
   <div class="flex flex-col items-center text-center">
    <div class="flex justify-center w-full "> 
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 32 32">
            <g fill="none">
                <path fill="#fcd53f" d="M24.888 30H7.112A2.093 2.093 0 0 1 5 27.914V15l10.877-3.06L27 15v12.914C27 29.06 26.06 30 24.888 30"/>
                <path fill="#f8312f" d="M27 5.847c0-3.384-4.045-5.106-6.466-2.763L16 7.479l-4.533-4.395C9.045.73 5 2.463 5 5.847C5 7.04 5.957 8 7.142 8L16 10.17L24.858 8A2.157 2.157 0 0 0 27 5.847"/>
                <path fill="#ffb02e" d="M27.662 8H4.337C3.6 8 3 8.6 3 9.342v4.316C3 14.4 3.6 15 4.338 15h23.324C28.4 15 29 14.4 29 13.658V9.342C29 8.6 28.4 8 27.662 8"/>
                <path fill="#ca0b4a" d="M16.005 3C14.345 3 13 4.37 13 6.06V30h6V6.06C19.01 4.37 17.666 3 16.005 3"/>
            </g>
        </svg>
    </div>

    <h1 class="text-4xl text-black font-bold p-2">AI Wishlist Generator</h1>
    <p class="text-xl text-gray-400 p-2">Tell us a bit about who it's for and we'll craft the perfect wishlist</p>
    </div>
    <!--form-->
    <div class="p-4 m-2">
        <form method="POST" action="{% url 'index' %}" class="bg-[#FDFCFB] space-y-6 rounded-2xl border-2 bg-card p-6 shadow-sm">
            {% csrf_token %}
            
            {% if error %}
            <div class="p-4 mb-4 text-sm text-fg-danger-strong rounded-md bg-[#441306] text-[#FFB85D]" role="alert">
            <span class="font-medium ">Warning alert!</span> {{ error }}
            </div>
            {% endif %}
            <!--age-->
          <div class="space-y-2">
            <label class="font-medium text-foreground text-md text-black">Age</label>
            <input
              id="age"
              type="number"
              name="age"
              min="1"
              max="100"
              placeholder="e.g. 25"
              value="{{age}}"
              class="p-2 mt-5 border-2 bg-card rounded-md w-full bg-[#FBF7F4] text-black font-normal"
              
              required/>
          </div>
          <!--gender-->
          <div class="mb-6 text-left w-full max-w-md">
            <label for="gender" class="font-medium text-foreground text-md text-black ">Gender</label>
    
            <div class="relative mt-3">
                <select id="gender" name="gender" 
                    class="w-full bg-[#FBF7F4]  rounded-md p-2 pr-10 border-2 bg-card text-gray-700 font-normal outline-none appearance-none focus:border-black focus:ring-2 focus:ring-orange-50 transition-all shadow-sm cursor-pointer  " required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </div>

            </div>
            </div>
            <!--limit-->
            <div class="space-y-2">
            <label class="font-medium text-foreground text-md text-black">Limit</Label>
            <input
              id="limit"
              type="number"
              name="limit"
              min="1"
              max="10"
              placeholder="limit ranges from 1-10"
              value="{{limit}}"
              class="p-2 mt-5 border-2 bg-card rounded-md w-full bg-[#FBF7F4] text-black font-normal"
              
              required/>
          </div>
            <!--category-->
            <div class="space-y-3">
                <label class="text-md font-medium text-black">
                    Categories <span class="text-gray-500 font-normal">(select one or more)</span>
                </label>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">

                    <label class="cursor-pointer group ">
                        <input type="checkbox" name="category" id="category" value="Tech" class="hidden peer" checked>

                                         w-full h-32 max-w-md
